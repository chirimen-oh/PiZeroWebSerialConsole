<!doctype html>
<html>
  <head>
    <title>CHIRIMEN panel for Raspberry Pi Zero webSerialConsole</title>
    <meta charset="utf-8" />
  </head>
  <script>
    var appDir = "~/myApp";
    var residentCronTag = "chirimenResidentApp"; // crontab @reboot 行の目印

    onload = async function () {
      window.addEventListener("message", receiveMessage, false);
      portWritelnWaitfor = window.opener.portWritelnWaitfor;
      getOutputLines = function (inp) {
        var ret = window.opener.getOutputLines(inp);
        console.log(ret);
        return ret;
      };
      cmdPrompt = window.opener.cmdPrompt;
      mv = window.opener.mv;
      cp = window.opener.cp;
      showDir = window.opener.showDir;
    };
    const sleep = (msec) => new Promise((resolve) => setTimeout(resolve, msec));

    var nodeVersion = "v22.9.0";
    async function setupChirimen() {
      messageDiv.innerHTML = "START CHIRIMEN SETUP";
      var ret;

      ret = getOutputLines(await portWritelnWaitfor("cd", cmdPrompt));
      var nodeV;
      ret = getOutputLines(
        await portWritelnWaitfor("node -v", cmdPrompt, 20000),
      );
      if (ret[1].indexOf("-bash:") == 0) {
        ret = getOutputLines(
          await portWritelnWaitfor("mkdir chirimenSetup", cmdPrompt),
        );
        ret = getOutputLines(
          await portWritelnWaitfor("cd chirimenSetup", cmdPrompt),
        );
        ret = getOutputLines(
          await portWritelnWaitfor("VERSION=" + nodeVersion, cmdPrompt),
        );
        ret = getOutputLines(
          await portWritelnWaitfor("DISTRO=linux-armv6l", cmdPrompt),
        );
        messageDiv.innerHTML = "NOW GETTING NODE.JS RUNTIME";
        ret = getOutputLines(
          await portWritelnWaitfor(
            "wget https://unofficial-builds.nodejs.org/download/release/$VERSION/node-$VERSION-$DISTRO.tar.xz",
            cmdPrompt,
            200000,
          ),
        );
        ret = getOutputLines(
          await portWritelnWaitfor(
            "sudo mkdir -p /usr/local/lib/nodejs",
            cmdPrompt,
          ),
        );

        messageDiv.innerHTML = "NOW EXTRACTING NODE.JS RUNTIME";
        ret = getOutputLines(
          await portWritelnWaitfor(
            "sudo tar -xJvf node-$VERSION-$DISTRO.tar.xz -C /usr/local/lib/nodejs",
            cmdPrompt,
            200000,
          ),
        );

        ret = getOutputLines(
          await portWritelnWaitfor(
            'echo -n -e "# Nodejs\nVERSION=' +
              nodeVersion +
              '\nDISTRO=linux-armv6l\n\nexport PATH=/usr/local/lib/nodejs/node-$VERSION-$DISTRO/bin:$PATH\n" | tee -a ~/.profile',
            cmdPrompt,
          ),
        );

        ret = getOutputLines(
          await portWritelnWaitfor(". ~/.profile", cmdPrompt),
        );

        messageDiv.innerHTML = "NODE.JS RUNTIME INSTALLATION COMPLETED!";
        ret = getOutputLines(await portWritelnWaitfor("cd", cmdPrompt));
        ret = getOutputLines(
          await portWritelnWaitfor("node -v", cmdPrompt, 20000),
        );
        nodeV = "Version:<br> node.js:" + ret[1];
        ret = getOutputLines(
          await portWritelnWaitfor("npm -v", cmdPrompt, 20000),
        );
        nodeV += "<br>" + " npm:" + ret[1];
      } else {
        nodeV = "Version:<br> node.js:" + ret[1];
        ret = getOutputLines(
          await portWritelnWaitfor("npm -v", cmdPrompt, 20000),
        );
        nodeV += "<br>" + " npm:" + ret[1];
      }

      console.log("Add legacy camera support");
      // add legacy camera support 2022/10/27
      ret = getOutputLines(
        await portWritelnWaitfor(
          "sudo raspi-config nonint do_camera 0",
          cmdPrompt,
        ),
      );
      ret = getOutputLines(
        await portWritelnWaitfor(
          "sudo raspi-config nonint do_legacy 0",
          cmdPrompt,
        ),
      );

      messageDiv.innerHTML =
        nodeV +
        "<br><br>NEXT building CHIRIMEN environment and its libraries on " +
        appDir;

      await buildChirimenDevDir(appDir);
      ret = getOutputLines(await portWritelnWaitfor("cd", cmdPrompt));
      await showDir();
      messageDiv.innerHTML =
        "CONGRATURATIONS. setup completed!<br>Your prototyping directory is " +
        appDir;
    }

    async function buildChirimenDevDir(targetDir) {
      if (!targetDir) {
        targetDir = appDir;
      }
      var ret;
      ret = getOutputLines(
        await portWritelnWaitfor("mkdir " + targetDir, cmdPrompt),
      );
      ret = getOutputLines(
        await portWritelnWaitfor("cd " + targetDir, cmdPrompt),
      );
      ret = getOutputLines(
        await portWritelnWaitfor(
          "wget -O package.json https://tutorial.chirimen.org/pizero/package.json",
          cmdPrompt,
          20000,
        ),
      );
      ret = getOutputLines(
        await portWritelnWaitfor(
          "wget -O RelayServer.js https://chirimen.org/remote-connection/js/beta/RelayServer.js",
          cmdPrompt,
          20000,
        ),
      );
      ret = getOutputLines(
        await portWritelnWaitfor("npm install", cmdPrompt, 500000),
      );
    }

    async function i2cdetect() {
      // 2022/10/24 remove -r option
      var ret = getOutputLines(
        await portWritelnWaitfor(" i2cdetect -y 1", cmdPrompt),
      );
      var ht = "<pre><code>     ";
      for (var i = 1; i < ret.length - 1; i++) {
        ht += ret[i] + "\n";
      }
      ht += "</pre></code>";
      messageDiv.innerHTML = ht;
    }

    function examplePanel() {
      var ifr = document.createElement("iframe");
      ifr.style.width = "100%";
      ifr.style.height = "100%";
      //	ifr.src="../tmp/e_index.html";
      ifr.src = "https://tutorial.chirimen.org/pizero/esm-examples/";
      messageDiv.innerHTML = "";
      messageDiv.appendChild(ifr);
    }

    async function receiveMessage(event) {
      console.log("get message:", event);
      if (event.data.req && event.data.req == "getSrc") {
        var ret = getOutputLines(
          await portWritelnWaitfor("cd " + appDir, cmdPrompt),
        );
        var fileName = "main-" + event.data.exampleId + ".js";
        ret = getOutputLines(
          await portWritelnWaitfor(
            "wget " + event.data.url + " -O " + fileName,
            cmdPrompt,
            20000,
          ),
        );
        await showDir();
      }
    }

    async function getJsApps() {
      var ret = getOutputLines(
        await portWritelnWaitfor(` cd ${appDir}`, cmdPrompt),
      );
      await window.opener.showDir();
      var files = (await window.opener.lsal()).files;
      var jsApps = [];
      for (var file of files) {
        if (file.name.endsWith(".js")) {
          jsApps.push(file.name);
        }
      }
      return jsApps;
    }

    // === 常駐アプリ管理 ======================================================
    // forever を廃止し、crontab の @reboot と getJsApps() を 1 次ソースにする。
    //   ・どのアプリを常駐させるか → crontab の @reboot 行(目印コメント付き)
    //   ・常駐の即時起動           → setsid + 監視ループ(端末切断後も生存・編集で再読込・落ちたら再起動)
    //   ・PID は ~/myApp/.pid、ログは実行ファイルと同じ場所({ベース名}.log)
    // cron は ~/.profile を読まないので bash -lc で node に PATH を通す。

    // 常駐起動の bash -lc 本体(cron / 即時起動 で共用)。$1 に .js ファイル名を渡す。
    // echo $$ で PID を記録し exec で node に置換するため、PID ファイルには
    // node 本体(= setsid によりプロセスグループの先頭)の PID が入る。
    function residentLaunchScript() {
      return `cd ${appDir} && echo $$ > ${appDir}/.pid && exec node --watch "$1" >> "\${1%.js}.log" 2>&1`;
    }

    // crontab に書き込む @reboot 行。行全体は cron の sh -c に渡される。
    function residentCronLine(appName) {
      return `@reboot setsid bash -lc '${residentLaunchScript()}' _ '${appName}' # ${residentCronTag}`;
    }

    // 文字列をシェルの単一引用符で安全に囲む(中の ' は '\'' に置換)。
    function shSingleQuote(str) {
      return "'" + String(str).replace(/'/g, "'\\''") + "'";
    }

    // @reboot 行を 1 件だけ設定する(既存の chirimen / forever 行は除去して上書き)。
    async function setResidentCron(appName) {
      await portWritelnWaitfor(
        ` { crontab -l 2>/dev/null | grep -vE '${residentCronTag}|forever'; echo ${shSingleQuote(residentCronLine(appName))}; } | crontab -`,
        cmdPrompt,
        20000,
      );
    }

    // @reboot 行を除去する(他の cron 行は残す)。
    async function clearResidentCron() {
      await portWritelnWaitfor(
        ` crontab -l 2>/dev/null | grep -vE '${residentCronTag}|forever' | crontab -`,
        cmdPrompt,
        20000,
      );
    }

    // 常駐アプリを今すぐ起動する(setsid で端末から切り離す)。
    async function startResidentNow(appName) {
      await portWritelnWaitfor(
        ` setsid bash -lc '${residentLaunchScript()}' _ ${escapePath(appName)} </dev/null >/dev/null 2>&1 &`,
        cmdPrompt,
        20000,
      );
    }

    // 起動中の常駐アプリを停止する(PID ファイルのプロセスグループごと kill)。
    async function stopResidentNow() {
      await portWritelnWaitfor(
        ` \
if [ -f ${appDir}/.pid ]; then \
  kill -- -"$(cat ${appDir}/.pid)" 2>/dev/null || \
  kill "$(cat ${appDir}/.pid)" 2>/dev/null; \
  rm -f ${appDir}/.pid; \
fi`,
        cmdPrompt,
        20000,
      );
    }

    async function stopResidentApp() {
      await stopResidentNow();
      await clearResidentCron();
    }

    async function startResidentApp(appName) {
      await setResidentCron(appName);
      await startResidentNow(appName);
    }

    async function changeResidentApp(event) {
      await portWritelnWaitfor(` cd ${appDir}`, cmdPrompt);
      await window.opener.showDir();
      var apName = event.target.value;
      disableResidentAppTable(true);
      console.log("changeResidentApp:", apName);
      if (apName == "StopAllApps") {
        subMsgDiv.innerText = "Start to stop the resident apps.";
        await stopResidentApp();
      } else {
        subMsgDiv.innerText = "Start changing resident apps. Ph. 1/2";
        await stopResidentApp();
        subMsgDiv.innerText = "Start changing resident apps. Ph. 2/2";
        await startResidentApp(apName);
      }
      await appPanel();
    }

    function disableResidentAppTable(disabled) {
      var trs = document.getElementById("residentAppTable").children;
      for (var tr of trs) {
        if (tr.children[2].firstElementChild) {
          tr.children[2].firstElementChild.disabled = disabled;
        }
      }
    }

    async function appPanel() {
      var apps = await getJsApps();
      messageDiv.innerHTML = "";
      var subMsgDiv = document.createElement("div");
      subMsgDiv.id = "subMsgDiv";
      messageDiv.appendChild(subMsgDiv);
      console.log(apps);
      var tbl = document.createElement("table");
      tbl.setAttribute("border", "1");
      tbl.id = "residentAppTable";
      var trs = {};
      var tr = document.createElement("tr");
      tr.innerHTML = "<th>Now Running</th><th>App Name</th><th>Select</th>";
      tbl.appendChild(tr);
      tr = document.createElement("tr");
      tr.innerHTML =
        '<td>-</td><td>STOP ALL APPS</td><td><input type="radio" name="runApp" value="StopAllApps" disabled onchange="changeResidentApp(event)"></td>';
      trs["StopAllApps"] = tr;
      tbl.appendChild(tr);
      for (var app of apps) {
        tr = document.createElement("tr");
        var td1 = document.createElement("td");
        var td2 = document.createElement("td");
        td2.innerText = app;
        var td3 = document.createElement("td");
        td3.innerHTML =
          '<input type="radio" name="runApp" value="' +
          app +
          '" disabled onchange="changeResidentApp(event)">';
        tr.appendChild(td1);
        tr.appendChild(td2);
        tr.appendChild(td3);
        tbl.appendChild(tr);
        trs[app] = tr;
      }
      subMsgDiv.innerText = "Checking running apps";
      messageDiv.appendChild(tbl);
      showResidentApp(trs);
    }

    // crontab -l を 1 次ソースに、どのアプリが常駐設定かを表に反映する。
    async function showResidentApp(trs) {
      console.log("showResidentApp:", trs);
      var ret = getOutputLines(
        await portWritelnWaitfor(" crontab -l", cmdPrompt, 20000),
      );
      subMsgDiv.innerText = "-";
      var current = null;
      for (var line of ret) {
        if (
          line.indexOf(residentCronTag) >= 0 &&
          line.indexOf("@reboot") >= 0
        ) {
          var m = line.match(/_ '([^']*)' # /);
          if (m) {
            current = m[1];
          }
        }
      }
      console.log("resident app:", current);
      if (current && trs[current]) {
        trs[current].children[0].innerText = "RUNNING";
        trs[current].children[2].firstElementChild.checked = true;
      } else {
        trs["StopAllApps"].children[2].firstElementChild.checked = true;
      }
      disableResidentAppTable(false);
    }

    /**
     * パス文字列の Bash のためのエスケープ処理
     * Bash ANSI-C Quoting を参照
     * @todo ディレクトリトラバーサル対策してほしい
     * @param {string} path
     * @return {string} Bash ANSI-C Quoting による表現
     */
    function escapePath(path) {
      const jsonString = JSON.stringify(String(path));
      return jsonString.replace(/^"/, `$$'`).replace(/"$/, `'`);
    }
  </script>
  <body>
    <input type="button" onclick="setupChirimen()" value="setup CHIRIMEN" />
    <input type="button" onclick="i2cdetect()" value="i2cdetect" />
    <input type="button" onclick="examplePanel()" value="Get Examples" />
    <input type="button" onclick="appPanel()" value="Resident App Conf." />
    <div id="messageDiv" style="width: 100%; height: 600px">
      <img height="600" src="wallpaperS.png" />
    </div>
  </body>
</html>
